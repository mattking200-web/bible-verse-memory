<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Memory Vault | v3 Stable</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF7; color: #1e293b; margin: 0; }
        .serif { font-family: 'Crimson Pro', serif; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #d97706; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const API_KEY = 'dd6d6d32c68659c64d43d4d3a983e048217aa224';

        // Reusable Icon component that won't break on re-renders
        const Icon = ({ name, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
            return <i data-lucide={name} className={className} style={{width: '1em', height: '1em'}}></i>;
        };

        const App = () => {
            const [verse, setVerse] = useState("I can do all things through him who strengthens me.");
            const [reference, setReference] = useState("Philippians 4:13");
            const [xp, setXp] = useState(0);
            const [vault, setVault] = useState([]);
            const [activeMode, setActiveMode] = useState('menu');
            const [loading, setLoading] = useState(false);
            const [inputValue, setInputValue] = useState("");

            // Game States
            const [eraseLevel, setEraseLevel] = useState(0);
            const [scrambleProgress, setScrambleProgress] = useState([]);
            const [scrambledWords, setScrambledWords] = useState([]);
            const [recallInput, setRecallInput] = useState('');

            // Persistence
            useEffect(() => {
                const saved = localStorage.getItem('bm_vault_v3');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setXp(parsed.xp || 0);
                        setVault(parsed.vault || []);
                    } catch(e) { console.error("Save data corrupt"); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('bm_vault_v3', JSON.stringify({ xp, vault }));
            }, [xp, vault]);

            const handleFetch = async () => {
                if (!inputValue) return;
                setLoading(true);
                try {
                    const url = `https://api.esv.org/v3/passage/text/?q=${encodeURIComponent(inputValue)}&include-headings=false&include-footnotes=false&include-verse-numbers=false&include-short-copyright=false&include-passage-references=false`;
                    const res = await fetch(url, { headers: { 'Authorization': `Token ${API_KEY}` } });
                    const data = await res.json();
                    
                    if (data && data.passages && data.passages.length > 0) {
                        const cleanText = data.passages[0].trim().replace(/\s+/g, ' ');
                        setVerse(cleanText);
                        setReference(inputValue);
                        setInputValue("");
                        setActiveMode('menu');
                    } else {
                        alert("Could not find that verse. Please try 'John 3:16'.");
                    }
                } catch (err) {
                    alert("Network error. Check your connection.");
                } finally {
                    setLoading(false);
                }
            };

            const awardXp = (pts) => setXp(p => p + pts);

            return (
                <div className="min-h-screen flex flex-col max-w-xl mx-auto border-x border-slate-100 bg-white">
                    <header className="p-4 bg-slate-900 text-white flex justify-between items-center sticky top-0 z-10">
                        <div className="flex items-center gap-2 font-bold">
                            <Icon name="book-open" className="text-yellow-500" />
                            <span>Vault</span>
                        </div>
                        <div className="flex items-center gap-3">
                             <div className="text-orange-400 font-bold flex items-center gap-1 text-sm">
                                <Icon name="flame" /> 1
                            </div>
                            <div className="bg-slate-800 px-3 py-1 rounded text-yellow-500 font-mono text-xs border border-slate-700">
                                {xp} XP
                            </div>
                        </div>
                    </header>

                    <main className="p-4 flex-1">
                        <AnimatePresence mode="wait">
                            {activeMode === 'menu' ? (
                                <motion.div key="menu" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="space-y-6">
                                    <div className="bg-[#FAF9F6] p-6 rounded-2xl border border-yellow-100 shadow-sm relative">
                                        <p className="text-xl serif italic text-slate-800 leading-relaxed">"{verse}"</p>
                                        <p className="text-yellow-800 font-bold text-xs mt-3 uppercase tracking-widest">— {reference}</p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <GameCard icon="eraser" title="Eraser" color="blue" onClick={() => {setActiveMode('eraser'); setEraseLevel(0);}} />
                                        <GameCard icon="shuffle" title="Scramble" color="purple" onClick={() => {
                                            setActiveMode('scramble');
                                            const words = verse.split(' ').map((w, i) => ({ id: i, text: w }));
                                            setScrambledWords([...words].sort(() => Math.random() - 0.5));
                                            setScrambleProgress([]);
                                        }} />
                                        <GameCard icon="zap" title="Blitz" color="yellow" onClick={() => setActiveMode('blitz')} />
                                        <GameCard icon="keyboard" title="Recall" color="green" onClick={() => {setActiveMode('recall'); setRecallInput('');}} />
                                    </div>

                                    <div className="flex gap-2">
                                        <input 
                                            value={inputValue}
                                            onChange={(e) => setInputValue(e.target.value)}
                                            onKeyDown={(e) => e.key === 'Enter' && handleFetch()}
                                            className="flex-1 p-3 rounded-xl border border-slate-200 outline-none focus:border-yellow-500 text-sm" 
                                            placeholder="Enter verse (e.g. John 3:16)" 
                                        />
                                        <button onClick={handleFetch} className="bg-slate-900 text-white w-12 h-12 rounded-xl flex items-center justify-center">
                                            {loading ? <div className="loader"></div> : <Icon name="search"/>}
                                        </button>
                                    </div>

                                    {vault.length > 0 && (
                                        <div>
                                            <h3 className="text-[10px] font-bold text-slate-400 tracking-widest mb-3">YOUR VAULT</h3>
                                            <div className="space-y-2">
                                                {vault.map((v, i) => (
                                                    <div key={i} onClick={() => {setVerse(v.text); setReference(v.ref);}} className="p-3 bg-white border rounded-lg flex justify-between items-center cursor-pointer hover:border-yellow-400">
                                                        <span className="font-bold text-xs">{v.ref}</span>
                                                        <Icon name="play" className="text-slate-300" />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <button 
                                        onClick={() => {
                                            if(!vault.find(v => v.ref === reference)) setVault([{ref: reference, text: verse}, ...vault]);
                                        }}
                                        className="w-full py-3 border-2 border-dashed border-slate-200 text-slate-400 text-xs font-bold rounded-xl"
                                    >
                                        + SAVE CURRENT VERSE
                                    </button>
                                </motion.div>
                            ) : (
                                <motion.div key="game" initial={{y:10, opacity:0}} animate={{y:0, opacity:1}} exit={{y:10, opacity:0}} className="bg-white rounded-2xl min-h-[400px] flex flex-col">
                                    <div className="flex justify-between items-center mb-6">
                                        <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">{activeMode} Mode</span>
                                        <button onClick={() => setActiveMode('menu')} className="text-slate-300 hover:text-slate-900"><Icon name="x-circle" /></button>
                                    </div>

                                    <div className="flex-1 flex flex-col justify-center px-2">
                                        {activeMode === 'eraser' && (
                                            <div className="text-center">
                                                <div className="text-xl serif leading-relaxed mb-10">
                                                    {verse.split(' ').map((w, i) => (
                                                        <span key={i} className={`mx-0.5 transition-all duration-500 ${(i * 7) % 10 < eraseLevel ? 'opacity-0 blur-sm' : ''}`}>{w} </span>
                                                    ))}
                                                </div>
                                                <button onClick={() => eraseLevel < 10 ? setEraseLevel(l => l + 2) : awardXp(10)} className="bg-slate-900 text-white px-8 py-3 rounded-full font-bold text-sm">
                                                    {eraseLevel < 10 ? "Erase More" : "Mastered! +10 XP"}
                                                </button>
                                            </div>
                                        )}

                                        {activeMode === 'scramble' && (
                                            <div>
                                                <div className="p-4 bg-slate-50 rounded-xl border-2 border-dashed mb-6 flex flex-wrap gap-2 min-h-[80px]">
                                                    {scrambleProgress.map((w, i) => <span key={i} className="bg-white px-2 py-1 rounded shadow-sm border text-xs">{w.text}</span>)}
                                                </div>
                                                <div className="flex flex-wrap justify-center gap-2">
                                                    {scrambledWords.map(w => (
                                                        <button key={w.id} onClick={() => {
                                                            setScrambleProgress([...scrambleProgress, w]);
                                                            setScrambledWords(scrambledWords.filter(x => x.id !== w.id));
                                                            if(scrambledWords.length === 1) awardXp(15);
                                                        }} className="bg-white px-3 py-2 rounded-lg border border-slate-200 text-xs shadow-sm">
                                                            {w.text}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {activeMode === 'blitz' && (
                                            <div className="text-center">
                                                <div className="text-3xl font-bold tracking-[0.25em] text-slate-300 mb-10 break-all px-4">
                                                    {verse.split(' ').map((w, i) => <span key={i} className="mx-1 border-b-2 border-slate-100">{w[0]}</span>)}
                                                </div>
                                                <button onClick={() => awardXp(10)} className="bg-yellow-500 text-white px-8 py-3 rounded-full font-bold text-sm">Recited It!</button>
                                            </div>
                                        )}

                                        {activeMode === 'recall' && (
                                            <div className="space-y-4">
                                                <textarea 
                                                    className="w-full h-32 p-4 rounded-xl border border-slate-200 serif text-lg outline-none focus:border-green-500"
                                                    placeholder="Type verse..."
                                                    value={recallInput}
                                                    onChange={(e) => {
                                                        setRecallInput(e.target.value);
                                                        if(e.target.value.trim().toLowerCase() === verse.trim().toLowerCase()) awardXp(20);
                                                    }}
                                                />
                                                <div className="flex flex-wrap gap-1 text-[10px] leading-tight">
                                                    {recallInput.split(' ').map((w, i) => {
                                                        const target = verse.split(' ')[i];
                                                        const ok = target && w.toLowerCase().replace(/[^\w]/g, '') === target.toLowerCase().replace(/[^\w]/g, '');
                                                        return <span key={i} className={ok ? "text-green-500" : "text-red-400 font-bold"}>{w} </span>;
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </header>
            );
        };

        const GameCard = ({ icon, title, color, onClick }) => (
            <button onClick={onClick} className="p-4 bg-white border border-slate-100 rounded-2xl flex flex-col items-center gap-2 hover:bg-slate-50 shadow-sm transition">
                <div className={`p-2 rounded-lg bg-${color}-50 text-${color}-600`}><Icon name={icon}/></div>
                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">{title}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
