<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Memory Vault | Persistent</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF7; }
        .serif { font-family: 'Crimson Pro', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const API_KEY = 'dd6d6d32c68659c64d43d4d3a983e048217aa224';
        const RANKS = [
            { name: 'Scribe', minXp: 0 },
            { name: 'Herald', minXp: 50 },
            { name: 'Watchman', minXp: 150 },
            { name: 'Disciple', minXp: 300 },
            { name: 'Commander', minXp: 600 }
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // Core States
            const [verse, setVerse] = useState("I can do all things through him who strengthens me.");
            const [reference, setReference] = useState("Philippians 4:13");
            const [xp, setXp] = useState(0);
            const [streak, setStreak] = useState(1);
            const [vault, setVault] = useState([]);
            const [activeMode, setActiveMode] = useState('menu');
            const [loading, setLoading] = useState(false);

            // Game Logic States
            const [eraseLevel, setEraseLevel] = useState(0);
            const [scrambleProgress, setScrambleProgress] = useState([]);
            const [scrambledWords, setScrambledWords] = useState([]);
            const [recallInput, setRecallInput] = useState('');

            // --- PERSISTENCE LAYER ---
            useEffect(() => {
                const savedData = localStorage.getItem('bible_vault_v1');
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    setXp(parsed.xp || 0);
                    setVault(parsed.vault || []);
                    setStreak(parsed.streak || 1);
                }
            }, []);

            useEffect(() => {
                const dataToSave = { xp, vault, streak };
                localStorage.setItem('bible_vault_v1', JSON.stringify(dataToSave));
                lucide.createIcons();
            }, [xp, vault, streak, activeMode, loading]);

            // --- ACTIONS ---
            const fetchVerse = async (query) => {
                if (!query) return;
                setLoading(true);
                try {
                    const res = await fetch(`https://api.esv.org/v3/passage/text/?q=${encodeURIComponent(query)}&include-headings=false&include-footnotes=false&include-verse-numbers=false&include-short-copyright=false`, {
                        headers: { 'Authorization': `Token ${API_KEY}` }
                    });
                    const data = await res.json();
                    if (data.passages?.length > 0) {
                        setVerse(data.passages[0].trim());
                        setReference(query);
                        setActiveMode('menu');
                    }
                } catch (err) { alert("API Error. Check connection."); }
                finally { setLoading(false); }
            };

            const addToVault = () => {
                if (!vault.find(v => v.ref === reference)) {
                    setVault([...vault, { ref: reference, text: verse }]);
                    alert("Added to your Vault!");
                }
            };

            const awardXp = (pts) => {
                setXp(prev => prev + pts);
            };

            const currentRank = RANKS.reduce((prev, curr) => (xp >= curr.minXp ? curr : prev));

            return (
                <div className="min-h-screen pb-20">
                    <nav className="sticky top-0 z-50 flex justify-between items-center p-5 bg-[#0F172A] text-white shadow-xl">
                        <div className="flex items-center gap-2">
                            <Icon name="shield-check" className="text-yellow-500" />
                            <h1 className="text-lg font-bold">Memory Vault</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-1 text-orange-400 font-bold">
                                <Icon name="flame" /> <span>{streak}</span>
                            </div>
                            <div className="bg-slate-800 px-3 py-1 rounded-lg border border-slate-700">
                                <span className="text-[10px] uppercase text-slate-400 mr-2">{currentRank.name}</span>
                                <span className="text-yellow-500 font-mono text-sm">{xp} XP</span>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-2xl mx-auto p-4 mt-4">
                        <AnimatePresence mode="wait">
                            {activeMode === 'menu' ? (
                                <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="space-y-6">
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-1 h-full bg-yellow-500"></div>
                                        <p className="text-2xl serif italic text-slate-700 leading-snug mb-3">"{verse}"</p>
                                        <p className="text-yellow-700 font-bold text-sm">— {reference}</p>
                                        <button onClick={addToVault} className="mt-4 flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-yellow-600 transition">
                                            <Icon name="bookmark" size={14}/> SAVE TO VAULT
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <ModeBtn icon="eraser" color="blue" title="Eraser" onClick={() => {setActiveMode('eraser'); setEraseLevel(0);}} />
                                        <ModeBtn icon="layout-grid" color="purple" title="Scramble" onClick={() => {
                                            setActiveMode('scramble');
                                            const words = verse.split(' ').map((w, i) => ({ id: i, text: w }));
                                            setScrambledWords([...words].sort(() => Math.random() - 0.5));
                                            setScrambleProgress([]);
                                        }} />
                                        <ModeBtn icon="zap" color="yellow" title="Blitz" onClick={() => setActiveMode('blitz')} />
                                        <ModeBtn icon="type" color="green" title="Recall" onClick={() => {setActiveMode('recall'); setRecallInput('');}} />
                                    </div>

                                    <div className="flex gap-2">
                                        <input id="vInput" className="flex-1 p-4 rounded-2xl border border-slate-200 focus:ring-2 ring-yellow-500 outline-none" placeholder="Search Scripture..." />
                                        <button onClick={() => fetchVerse(document.getElementById('vInput').value)} className="bg-slate-900 text-white px-6 rounded-2xl">
                                            {loading ? "..." : <Icon name="search"/>}
                                        </button>
                                    </div>

                                    {vault.length > 0 && (
                                        <div className="mt-10">
                                            <h3 className="text-xs font-bold text-slate-400 mb-4 tracking-widest">SAVED IN VAULT</h3>
                                            <div className="space-y-2">
                                                {vault.map((v, i) => (
                                                    <div key={i} onClick={() => {setVerse(v.text); setReference(v.ref);}} className="p-4 bg-white rounded-xl border border-slate-100 flex justify-between items-center cursor-pointer hover:bg-slate-50">
                                                        <span className="font-bold text-slate-600">{v.ref}</span>
                                                        <Icon name="chevron-right" className="text-slate-300"/>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </motion.div>
                            ) : (
                                <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} className="bg-white p-6 rounded-3xl shadow-xl min-h-[400px] flex flex-col">
                                    <div className="flex justify-between items-center mb-10">
                                        <h2 className="font-black text-slate-300 uppercase tracking-tighter">{activeMode} Mode</h2>
                                        <button onClick={() => setActiveMode('menu')} className="text-slate-300 hover:text-slate-900"><Icon name="x" size={28}/></button>
                                    </div>

                                    <div className="flex-1 flex flex-col justify-center">
                                        {activeMode === 'eraser' && (
                                            <div className="text-center">
                                                <div className="text-2xl serif leading-relaxed mb-10">
                                                    {verse.split(' ').map((w, i) => (
                                                        <span key={i} className={`mx-1 transition-all duration-700 ${(i * 7) % 10 < eraseLevel ? 'opacity-0 blur-md' : ''}`}>{w} </span>
                                                    ))}
                                                </div>
                                                <button onClick={() => eraseLevel < 10 ? setEraseLevel(l => l + 2) : awardXp(10)} className="bg-slate-900 text-white px-8 py-3 rounded-full font-bold">
                                                    {eraseLevel < 10 ? "Erase More" : "Mastered! +10 XP"}
                                                </button>
                                            </div>
                                        )}

                                        {activeMode === 'scramble' && (
                                            <div>
                                                <div className="p-4 bg-slate-50 rounded-2xl border-2 border-dashed mb-6 flex flex-wrap gap-2 min-h-[100px]">
                                                    {scrambleProgress.map((w, i) => <span key={i} className="bg-white px-2 py-1 rounded shadow-sm border">{w.text}</span>)}
                                                </div>
                                                <div className="flex flex-wrap justify-center gap-2">
                                                    {scrambledWords.map(w => (
                                                        <button key={w.id} onClick={() => {
                                                            setScrambleProgress([...scrambleProgress, w]);
                                                            setScrambledWords(scrambledWords.filter(x => x.id !== w.id));
                                                            if(scrambledWords.length === 1) awardXp(15);
                                                        }} className="bg-white p-2 rounded-lg border border-slate-300 shadow-sm active:bg-yellow-100">
                                                            {w.text}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {activeMode === 'blitz' && (
                                            <div className="text-center">
                                                <div className="text-4xl font-bold tracking-widest text-slate-300 mb-10">
                                                    {verse.split(' ').map((w, i) => <span key={i} className="mx-2 border-b-4 border-slate-100">{w[0]}</span>)}
                                                </div>
                                                <button onClick={() => awardXp(10)} className="bg-yellow-500 text-white px-8 py-3 rounded-full font-bold shadow-lg shadow-yellow-200">I Recited It!</button>
                                            </div>
                                        )}

                                        {activeMode === 'recall' && (
                                            <div>
                                                <textarea 
                                                    className="w-full h-32 p-4 rounded-xl border-2 border-slate-100 serif text-xl focus:border-yellow-500 outline-none"
                                                    placeholder="Type the verse..."
                                                    onChange={(e) => {
                                                        setRecallInput(e.target.value);
                                                        if(e.target.value.trim().toLowerCase() === verse.trim().toLowerCase()) awardXp(20);
                                                    }}
                                                />
                                                <div className="mt-4 flex flex-wrap gap-1 text-sm">
                                                    {recallInput.split(' ').map((w, i) => {
                                                        const target = verse.split(' ')[i];
                                                        const ok = target && w.toLowerCase().replace(/[^\w]/g, '') === target.toLowerCase().replace(/[^\w]/g, '');
                                                        return <span key={i} className={ok ? "text-green-500" : "text-red-400"}>{w} </span>;
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        const ModeBtn = ({ icon, color, title, onClick }) => (
            <button onClick={onClick} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition text-center group">
                <div className={`mx-auto mb-2 p-3 rounded-xl bg-${color}-50 text-${color}-600 group-hover:scale-110 transition w-fit`}>
                    <Icon name={icon}/>
                </div>
                <span className="text-xs font-bold text-slate-600 uppercase tracking-tighter">{title}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
