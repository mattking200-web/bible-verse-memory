<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Memory Vault | Fixed</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF7; color: #1e293b; }
        .serif { font-family: 'Crimson Pro', serif; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #d97706; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const API_KEY = 'dd6d6d32c68659c64d43d4d3a983e048217aa224';

        const Icon = ({ name, size = 18, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [verse, setVerse] = useState("I can do all things through him who strengthens me.");
            const [reference, setReference] = useState("Philippians 4:13");
            const [xp, setXp] = useState(0);
            const [vault, setVault] = useState([]);
            const [activeMode, setActiveMode] = useState('menu');
            const [loading, setLoading] = useState(false);

            // Game States
            const [eraseLevel, setEraseLevel] = useState(0);
            const [scrambleProgress, setScrambleProgress] = useState([]);
            const [scrambledWords, setScrambledWords] = useState([]);
            const [recallInput, setRecallInput] = useState('');

            // Load Data
            useEffect(() => {
                const saved = localStorage.getItem('bible_vault_final');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setXp(parsed.xp || 0);
                    setVault(parsed.vault || []);
                }
                lucide.createIcons();
            }, []);

            // Save Data & Refresh Icons
            useEffect(() => {
                localStorage.setItem('bible_vault_final', JSON.stringify({ xp, vault }));
                lucide.createIcons();
            }, [xp, vault, activeMode, loading]);

            const fetchVerse = async () => {
                const query = document.getElementById('vInput').value;
                if (!query) return;
                
                setLoading(true);
                try {
                    const res = await fetch(`https://api.esv.org/v3/passage/text/?q=${encodeURIComponent(query)}&include-headings=false&include-footnotes=false&include-verse-numbers=false&include-short-copyright=false`, {
                        headers: { 'Authorization': `Token ${API_KEY}` }
                    });
                    const data = await res.json();
                    
                    if (data && data.passages && data.passages.length > 0) {
                        setVerse(data.passages[0].trim());
                        setReference(query);
                        setActiveMode('menu');
                        document.getElementById('vInput').value = ""; // Clear input
                    } else {
                        alert("Verse not found. Try 'John 3:16' format.");
                    }
                } catch (err) {
                    console.error(err);
                    alert("Network error. Check your connection.");
                } finally {
                    setLoading(false);
                }
            };

            const awardXp = (pts) => { setXp(prev => prev + pts); };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="p-5 bg-slate-900 text-white flex justify-between items-center shadow-md">
                        <div className="flex items-center gap-2">
                            <Icon name="book" className="text-yellow-500" />
                            <span className="font-bold tracking-tight">Bible Memory Vault</span>
                        </div>
                        <div className="bg-slate-800 px-3 py-1 rounded text-yellow-500 font-mono text-sm border border-slate-700">
                            {xp} XP
                        </div>
                    </nav>

                    <main className="max-w-2xl mx-auto w-full p-4 flex-1">
                        <AnimatePresence mode="wait">
                            {activeMode === 'menu' ? (
                                <motion.div key="menu" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="space-y-6">
                                    <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                                        <p className="text-2xl serif italic mb-2">"{verse}"</p>
                                        <p className="text-yellow-700 font-bold text-sm">— {reference}</p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => {setActiveMode('eraser'); setEraseLevel(0);}} className="p-4 bg-white border rounded-xl flex flex-col items-center gap-2 hover:bg-slate-50 transition">
                                            <Icon name="eraser" className="text-blue-500"/>
                                            <span className="text-xs font-bold text-slate-500 uppercase">Eraser</span>
                                        </button>
                                        <button onClick={() => {
                                            setActiveMode('scramble');
                                            const words = verse.split(' ').map((w, i) => ({ id: i, text: w }));
                                            setScrambledWords([...words].sort(() => Math.random() - 0.5));
                                            setScrambleProgress([]);
                                        }} className="p-4 bg-white border rounded-xl flex flex-col items-center gap-2 hover:bg-slate-50 transition">
                                            <Icon name="layout-grid" className="text-purple-500"/>
                                            <span className="text-xs font-bold text-slate-500 uppercase">Scramble</span>
                                        </button>
                                        <button onClick={() => setActiveMode('blitz')} className="p-4 bg-white border rounded-xl flex flex-col items-center gap-2 hover:bg-slate-50 transition">
                                            <Icon name="zap" className="text-yellow-500"/>
                                            <span className="text-xs font-bold text-slate-500 uppercase">Blitz</span>
                                        </button>
                                        <button onClick={() => {setActiveMode('recall'); setRecallInput('');}} className="p-4 bg-white border rounded-xl flex flex-col items-center gap-2 hover:bg-slate-50 transition">
                                            <Icon name="type" className="text-green-500"/>
                                            <span className="text-xs font-bold text-slate-500 uppercase">Recall</span>
                                        </button>
                                    </div>

                                    <div className="flex gap-2">
                                        <input 
                                            id="vInput" 
                                            className="flex-1 p-4 rounded-xl border border-slate-300 outline-none focus:ring-2 ring-yellow-500/50" 
                                            placeholder="Enter verse (e.g. Genesis 1:1)" 
                                            onKeyDown={(e) => e.key === 'Enter' && fetchVerse()}
                                        />
                                        <button onClick={fetchVerse} className="bg-slate-900 text-white px-6 rounded-xl flex items-center justify-center min-w-[60px]">
                                            {loading ? <div className="loader"></div> : <Icon name="search"/>}
                                        </button>
                                    </div>

                                    {vault.length > 0 && (
                                        <div className="pt-4">
                                            <h3 className="text-[10px] font-black text-slate-400 tracking-[0.2em] mb-4">YOUR VAULT</h3>
                                            <div className="grid gap-2">
                                                {vault.map((v, i) => (
                                                    <div key={i} onClick={() => {setVerse(v.text); setReference(v.ref);}} className="bg-white p-3 rounded-lg border border-slate-100 flex justify-between cursor-pointer hover:border-yellow-500">
                                                        <span className="font-bold text-sm text-slate-700">{v.ref}</span>
                                                        <Icon name="chevron-right" className="text-slate-300"/>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <button 
                                        onClick={() => {
                                            if(!vault.find(v => v.ref === reference)) setVault([{ref: reference, text: verse}, ...vault]);
                                        }}
                                        className="w-full py-3 border-2 border-dashed border-slate-200 text-slate-400 font-bold rounded-xl hover:bg-slate-50 transition mt-4"
                                    >
                                        + SAVE CURRENT VERSE
                                    </button>
                                </motion.div>
                            ) : (
                                <motion.div key="game" initial={{scale:0.95, opacity:0}} animate={{scale:1, opacity:1}} exit={{scale:0.95, opacity:0}} className="bg-white p-6 rounded-2xl shadow-xl min-h-[400px] flex flex-col">
                                    <div className="flex justify-between items-center mb-8">
                                        <span className="font-black text-slate-300 uppercase">{activeMode}</span>
                                        <button onClick={() => setActiveMode('menu')} className="text-slate-400"><Icon name="x" size={24}/></button>
                                    </div>

                                    <div className="flex-1 flex flex-col justify-center">
                                        {activeMode === 'eraser' && (
                                            <div className="text-center">
                                                <div className="text-2xl serif leading-relaxed mb-10">
                                                    {verse.split(' ').map((w, i) => (
                                                        <span key={i} className={`mx-1 transition-all duration-700 ${(i * 7) % 10 < eraseLevel ? 'opacity-0 blur-sm' : ''}`}>{w} </span>
                                                    ))}
                                                </div>
                                                <button onClick={() => eraseLevel < 10 ? setEraseLevel(l => l + 2) : awardXp(10)} className="bg-blue-600 text-white px-8 py-3 rounded-full font-bold">
                                                    {eraseLevel < 10 ? "Erase Words" : "Mastered! +10 XP"}
                                                </button>
                                            </div>
                                        )}

                                        {activeMode === 'scramble' && (
                                            <div>
                                                <div className="p-4 bg-slate-50 rounded-xl border-2 border-dashed mb-6 flex flex-wrap gap-2 min-h-[80px]">
                                                    {scrambleProgress.map((w, i) => <span key={i} className="bg-white px-2 py-1 rounded shadow-sm border text-sm">{w.text}</span>)}
                                                </div>
                                                <div className="flex flex-wrap justify-center gap-2">
                                                    {scrambledWords.map(w => (
                                                        <button key={w.id} onClick={() => {
                                                            setScrambleProgress([...scrambleProgress, w]);
                                                            setScrambledWords(scrambledWords.filter(x => x.id !== w.id));
                                                            if(scrambledWords.length === 1) awardXp(15);
                                                        }} className="bg-white px-3 py-2 rounded-lg border border-slate-300 text-sm shadow-sm active:scale-95">
                                                            {w.text}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {activeMode === 'blitz' && (
                                            <div className="text-center">
                                                <div className="text-3xl font-bold tracking-[0.3em] text-slate-400 mb-10">
                                                    {verse.split(' ').map((w, i) => <span key={i} className="mx-2 border-b-2 border-slate-200">{w[0]}</span>)}
                                                </div>
                                                <button onClick={() => awardXp(10)} className="bg-yellow-500 text-white px-8 py-3 rounded-full font-bold">I Recited It!</button>
                                            </div>
                                        )}

                                        {activeMode === 'recall' && (
                                            <div>
                                                <textarea 
                                                    className="w-full h-32 p-4 rounded-xl border border-slate-200 serif text-xl outline-none focus:border-green-500"
                                                    placeholder="Type verse exactly..."
                                                    onChange={(e) => {
                                                        setRecallInput(e.target.value);
                                                        if(e.target.value.trim().toLowerCase() === verse.trim().toLowerCase()) awardXp(20);
                                                    }}
                                                />
                                                <div className="mt-4 flex flex-wrap gap-1 text-xs">
                                                    {recallInput.split(' ').map((w, i) => {
                                                        const target = verse.split(' ')[i];
                                                        const ok = target && w.toLowerCase().replace(/[^\w]/g, '') === target.toLowerCase().replace(/[^\w]/g, '');
                                                        return <span key={i} className={ok ? "text-green-500" : "text-red-400 font-bold"}>{w} </span>;
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
